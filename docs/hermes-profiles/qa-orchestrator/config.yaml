# qa-orchestrator — Hermes profile config (HF-2.6)
# Copy to: ~/.hermes/profiles/qa-orchestrator/config.yaml
# Secrets: ~/.hermes/.env (AWT_MCP_SECRET, etc.) — see scripts/hermes-migrate/hermes.env.*.example

# Model: set via `qa-orchestrator model` CLI or uncomment and adjust:
# model:
#   provider: openrouter
#   name: anthropic/claude-3.5-sonnet

# MCP — merge from docs/hermes-profiles/_shared/mcp_servers.yaml.example (profile: orchestrator)
mcp_servers:
  ai-web-test:
    url: "${AWT_MCP_URL}/mcp"
    headers:
      Authorization: "Bearer ${AWT_MCP_SECRET}"
    timeout: 180
    connect_timeout: 30

# Orchestrator uses delegate_task heavily; keep reasonable tool timeout for planner chains.
tool_timeout_seconds: 600

# qa-journey-planner — Hermes profile config (HF-3.1b)
# Copy to: ~/.hermes/profiles/qa-journey-planner/config.yaml
# Secrets: ~/.hermes/.env (AWT_MCP_SECRET, REQIQ_PROJECT_ID) — see scripts/hermes-migrate/hermes.env.*.example

# MCP — standard orchestrator/planner block from _shared/mcp_servers.yaml.example
mcp_servers:
  ai-web-test:
    url: "${AWT_MCP_URL}/mcp"
    headers:
      Authorization: "Bearer ${AWT_MCP_SECRET}"
    timeout: 180
    connect_timeout: 30

# ReqIQ readiness + suggest-from-wiki can be slow; allow chained tool calls.
tool_timeout_seconds: 300

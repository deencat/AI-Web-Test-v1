  /api/v1/projects/{projectId}/sources/upload:
    post:
      tags: [Sources]
      summary: Multipart file upload (one or more files per request)
      description: |
        `multipart/form-data` with **one or more file parts**. Part **field names are not fixed**—any standard file upload
        fields are accepted as long as each part is a binary file stream. Multiple files in one request are supported.
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              description: At least one file part (e.g. `file` or repeated parts).
              properties:
                file:
                  type: string
                  format: binary
                  description: Example field name; additional file parts may use any name.
      responses:
        "201":
          description: At least one file accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceUploadBatchResponse"
        "400":
          description: no_files | validation / unsupported type (see `rejected` when partial success uses 201)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: forbidden
        "413":
          description: file_too_large
        "404":
          description: not_found
        "500":
          description: upload_failed

  /api/v1/projects/{projectId}/sources:
    get:
      tags: [Sources]

      description: |
        Invokes tenant-configured chat LLM with the latest `iq` prompt template (or built-in default).
        Parses JSON `{ "scores": { dimension: 0-100, ... }, "rationale"?: string }`, applies tenant scorecard weights,
        and stores snapshot on the revision (`algorithm` = `reqiq_llm_v1`).
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: requirementId
          in: path
          required: true
          schema: { type: string }
        - name: revisionIndex
          in: path
          required: true
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: revision with iqSnapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RequirementContentRevision"
                  - type: object
                    properties:
                      model: { type: string, nullable: true }
                      provider: { type: string }

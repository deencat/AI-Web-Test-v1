        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: query
          in: query
          required: true
          schema: { type: string }
          description: Feature or acceptance-criteria text
        - name: feature
          in: query
          schema: { type: string }
          description: Optional display name to improve requirement title matching
        - name: threshold
          in: query
          schema: { type: number, minimum: 0, maximum: 100, default: 60 }
      responses:
        "200":
          content:
            application/json:
